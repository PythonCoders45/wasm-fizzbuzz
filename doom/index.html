
<!doctype html>

<!-- copied from https://raw.githubusercontent.com/mdn/webassembly-examples/master/understanding-text-format/logger2.html (CC0) -->

<html>

  <head>
    <meta charset="utf-8">
    <title>DooM</title>

    <style>
      #output {
        border: 3px groove aquamarine;
        background-color: bisque;
        width: 550px;
        height: 400px;
        font-family: monospace, serif;
        font-size: 10px;
        overflow-y: scroll;
      }
      #output span.log {
        color:darkslateblue;
      }
      #output span.stdout {
        color: black;
      }
      #output span.stderr {
        font-weight: bold;
        color:brown;
      }

      .container {
        display: flex;
      }

      canvas {
        display: block; /* Removes default inline margins */
        width: 100vw;  /* Sets width to 100% of the viewport width */
        height: 100vh; /* Sets height to 100% of the viewport height */
        position: absolute; /* Removes canvas from the normal document flow */
        top: 0;
        left: 0;
      }
    </style>
  </head>

  <body>
    
    <div class="container">
      <canvas id="screen" width="640" height="400" tabindex="0">This is where the DooM screen should render.</canvas>
      <span>&nbsp;</span>
      <div id="output"></div>
    </div>
    

    <script src="main.js" defer></script>
  </body>

</html>
